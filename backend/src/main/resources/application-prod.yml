spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: none
logging:
  level:
    root: WARN
    com.blog.cms: INFO
blog:
  cookie:
    # Allow COOKIE_SECURE env var to override default (true in prod, but
    # dev/CI running on HTTP must set COOKIE_SECURE=false or browsers will
    # reject the Secure cookie and break CSRF login flow).
    secure: ${COOKIE_SECURE:true}
  csrf:
    enabled: ${CSRF_ENABLED:true}
server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
    whitelabel:
      enabled: false  # Don't expose Spring's default whitelabel error page
