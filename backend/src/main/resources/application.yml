spring:
  application:
    name: blog-cms-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5434/blog_db}
    username: ${DB_USER:blog_user}
    password: ${DB_PASSWORD:blog_password_dev_only}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        format_sql: false
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

blog:
  upload:
    base-dir: ${UPLOAD_BASE_DIR:/data/uploads}
    max-file-size-bytes: 10485760
    allowed-mime-types:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-in-production-this-is-256-bit-min}
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 604800
  cookie:
    name: blog_session
    secure: ${COOKIE_SECURE:false}
    http-only: true
    same-site: lax
    domain: ${COOKIE_DOMAIN:}
  csrf:
    enabled: ${CSRF_ENABLED:true}
    header-name: X-CSRF-Token

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.blog.cms: DEBUG
    org.hibernate.SQL: INFO
