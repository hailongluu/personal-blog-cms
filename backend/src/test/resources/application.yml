spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=USER,KEY,VALUE,DESCRIPTION
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        globally_quoted_identifiers: false
    # Skip entities that use Postgres-only types (CITEXT, TEXT[]) — they'll be
    # defined by V900__h2_test_schema.sql below.
    defer-datasource-initialization: false
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:db/migration-h2/V900__h2_test_schema.sql
      continue-on-error: true  # V900 uses CLOB which Hibernate may have already created
blog:
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 604800
  cookie:
    secure: false
    http-only: true
    same-site: Lax
  csrf:
    enabled: true
    header-name: X-CSRF-Token
logging:
  level:
    org.flywaydb: WARN
    com.blog.cms: DEBUG
