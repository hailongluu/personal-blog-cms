server {
    listen 80 default_server;
    server_name _;

    # ── Security headers ─────────────────────────────────
    # HSTS — force HTTPS for 2 years (Cloudflare terminates TLS, so this is safe)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Prevent MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Clickjacking protection — only allow same-origin framing
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Referrer — only send origin on cross-origin requests
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disable powerful browser features the blog doesn't need
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # Content-Security-Policy — strict but pragmatic.
    # - default-src 'self': only same-origin by default
    # - script-src 'self' + 4 tracking providers (GTM/GA/FB/TT inject inline scripts)
    # - style-src 'self' 'unsafe-inline' + Google Fonts: Tailwind + react-helmet inject inline styles
    # - img-src 'self' data: https:: covers, OG images, tracking pixels
    # - connect-src 'self' + tracking APIs + backend
    # - frame-ancestors 'self': prevent embedding except same-origin
    # - form-action 'self': only allow forms to submit to our backend
    # - base-uri 'self': prevent <base> tag injection
    # - object-src 'none': block Flash/Java applets
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://connect.facebook.net https://analytics.tiktok.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com https://connect.facebook.net https://analytics.tiktok.com; frame-src https://www.googletagmanager.com; frame-ancestors 'self'; form-action 'self'; base-uri 'self'; object-src 'none'" always;

    # Hide nginx version
    server_tokens off;

    # ── Static assets (long cache) ───────────────────────
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /covers/ {
        alias /usr/share/nginx/html/covers/;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location /favicon.svg {
        alias /usr/share/nginx/html/favicon.svg;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /icons.svg {
        alias /usr/share/nginx/html/icons.svg;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Backend API (Spring Boot on :8080) ────────────────
    location /api/ {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
        # Don't apply CSP/HSTS to API responses (they're JSON, not HTML)
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Strict-Transport-Security;
    }

    location /uploads/ {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Strict-Transport-Security;
    }

    # ── Public SEO files (must be served as files, not SPA fallback) ──
    location = /robots.txt  { alias /usr/share/nginx/html/robots.txt; add_header Cache-Control "public, max-age=3600"; }
    # SeoController exposes /sitemap.xml at the root (uses
    # request.getServerName() so base URL is correct behind Cloudflare).
    # We pass Host/X-Forwarded-* so resolveBaseUrl() returns https://news.luuhailong.com.
    location = /sitemap.xml {
        proxy_pass http://host.docker.internal:8080/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Strict-Transport-Security;
    }
    # RssFeedController is at /api/public/feed.xml. /rss.xml is a friendlier
    # alias that some feed readers (e.g. Feedly) prefer to discover.
    location = /rss.xml     { proxy_pass http://host.docker.internal:8080/api/public/feed.xml; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header X-Forwarded-Host $host; proxy_set_header X-Forwarded-Port $server_port; proxy_hide_header Content-Security-Policy; proxy_hide_header Strict-Transport-Security; }
    location = /feed.xml    { proxy_pass http://host.docker.internal:8080/api/public/feed.xml; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header X-Forwarded-Host $host; proxy_set_header X-Forwarded-Port $server_port; proxy_hide_header Content-Security-Policy; proxy_hide_header Strict-Transport-Security; }

    # ── Static SEO assets (og image fallback, etc.) ───────
    location = /og-default.svg { alias /usr/share/nginx/html/og-default.svg; expires 7d; add_header Cache-Control "public"; }

    # ── SPA fallback (React Router) ───────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
