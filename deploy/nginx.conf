server {
    listen 80 default_server;
    server_name _;

    # ── Security headers ─────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static assets (long cache) ───────────────────────
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /covers/ {
        alias /usr/share/nginx/html/covers/;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location /favicon.svg {
        alias /usr/share/nginx/html/favicon.svg;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /icons.svg {
        alias /usr/share/nginx/html/icons.svg;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Backend API (Spring Boot on :8080) ────────────────
    location /api/ {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
    }

    location /uploads/ {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }

    # ── Public SEO files (must be served as files, not SPA fallback) ──
    location = /robots.txt  { alias /usr/share/nginx/html/robots.txt; add_header Cache-Control "public, max-age=3600"; }
    # SeoController exposes /sitemap.xml at the root (uses
    # request.getServerName() so base URL is correct behind Cloudflare).
    # We pass Host/X-Forwarded-* so resolveBaseUrl() returns https://news.luuhailong.com.
    location = /sitemap.xml {
        proxy_pass http://host.docker.internal:8080/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
    # RssFeedController is at /api/public/feed.xml. /rss.xml is a friendlier
    # alias that some feed readers (e.g. Feedly) prefer to discover.
    location = /rss.xml     { proxy_pass http://host.docker.internal:8080/api/public/feed.xml; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header X-Forwarded-Host $host; proxy_set_header X-Forwarded-Port $server_port; }
    location = /feed.xml    { proxy_pass http://host.docker.internal:8080/api/public/feed.xml; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header X-Forwarded-Host $host; proxy_set_header X-Forwarded-Port $server_port; }

    # ── Static SEO assets (og image fallback, etc.) ───────
    location = /og-default.svg { alias /usr/share/nginx/html/og-default.svg; expires 7d; add_header Cache-Control "public"; }

    # ── SPA fallback (React Router) ───────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
