server {
    listen 80 default_server;
    server_name _;

    # ── Security headers ─────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static assets (long cache) ───────────────────────
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /covers/ {
        alias /usr/share/nginx/html/covers/;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location /favicon.svg {
        alias /usr/share/nginx/html/favicon.svg;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /icons.svg {
        alias /usr/share/nginx/html/icons.svg;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Backend API (Spring Boot on :8080) ────────────────
    location /api/ {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
    }

    location /uploads/ {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }

    # ── Public SEO files (must be served as files, not SPA fallback) ──
    location = /sitemap.xml { proxy_pass http://host.docker.internal:8080/api/public/sitemap.xml; }
    location = /feed.xml    { proxy_pass http://host.docker.internal:8080/api/public/feed.xml; }
    location = /robots.txt  { proxy_pass http://host.docker.internal:8080/api/public/robots.txt; }

    # ── SPA fallback (React Router) ───────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
