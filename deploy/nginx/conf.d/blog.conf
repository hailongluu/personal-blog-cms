# =============================================================================
# Personal Blog CMS — site-specific nginx vhost
# =============================================================================
# Drop into /etc/nginx/conf.d/blog.conf
# Listens on :80 by default; add :443 server block when SSL is configured.
# =============================================================================

# ---------- Upstream already defined in nginx.conf ----------
# upstream blog_api { server blog-api:8080; ... }

# ---------- HTTP → HTTPS redirect (uncomment after SSL is set up) ----------
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    listen      80 default_server;
    server_name _;

    # ---- Health endpoint for Docker healthcheck ----
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---- Admin SPA (React/Vite) ----
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;

        # Cache hashed assets aggressively
        location ~* ^/admin/assets/.*\.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
            alias /usr/share/nginx/html/admin/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }

    # ---- Public SPA (React/Vite or Next.js) ----
    location / {
        root /usr/share/nginx/html/public;
        try_files $uri $uri/ /index.html;

        location ~* ^/assets/.*\.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }

    # ---- Spring Boot REST API ----
    location /api/ {
        proxy_pass         http://blog_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection          "";
        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_set_header   X-Forwarded-Host    $host;
        proxy_set_header   X-Request-ID        $request_id;

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering on;
        proxy_buffers   16 16k;
        proxy_buffer_size 32k;

        # Don't cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ---- Uploaded media ----
    location /uploads/ {
        alias /data/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff";

        # Prevent execution of uploaded files
        location ~* \.(php|pl|py|jsp|asp|sh|cgi)$ {
            deny all;
            return 403;
        }
    }

    # ---- Block common attack paths ----
    location ~ /\.(git|env|svn|hg) {
        deny all;
        return 404;
    }
    location ~ /(wp-admin|wp-login|administrator|phpmyadmin) {
        deny all;
        return 404;
    }
}

