# =============================================================================
# Personal Blog CMS — site vhost
# =============================================================================
# Architecture:
#   /          → Next.js public site (SSR)   [upstream public_web]
#   /admin/    → Admin SPA (React/Vite, static)
#   /api/      → Spring Boot REST API        [upstream blog_api]
#   /uploads/  → Backend media
#   /rss.xml   → Backend Atom feed (Next serves /sitemap.xml, /robots.txt, /og)
#
# Upstreams (public_web, blog_api) are defined in ../nginx.conf.
# =============================================================================

server {
    listen      80 default_server;
    server_name _;

    # ---- Health endpoint for Docker healthcheck ----
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---- Admin SPA (React/Vite, static) ----
    # NOTE: the admin bundle must be built with Vite base '/admin/' and a router
    # basename of '/admin' for deep links to resolve. (see public-frontend/MIGRATION.md)
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;

        # Use `root` (not `alias`) in a regex location — `alias` here is the
        # classic nginx gotcha that 404s. root maps /admin/assets/X →
        # /usr/share/nginx/html/admin/assets/X correctly.
        location ~* ^/admin/assets/.*\.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }

    # ---- Spring Boot REST API ----
    location /api/ {
        proxy_pass         http://blog_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection          "";
        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_set_header   X-Forwarded-Host    $host;
        proxy_set_header   X-Request-ID        $request_id;

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Don't cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ---- Uploaded media (served by backend) ----
    location /uploads/ {
        proxy_pass         http://blog_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff";
    }

    # ---- RSS / Atom feed (RssFeedController at /api/public/feed.xml) ----
    # Next.js serves /sitemap.xml, /robots.txt and /og itself (via the / proxy below),
    # so only the feed aliases need to reach the backend.
    location = /rss.xml {
        proxy_pass         http://blog_api/api/public/feed.xml;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
    }
    location = /feed.xml {
        proxy_pass         http://blog_api/api/public/feed.xml;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
    }

    # ---- Brand static assets (blog cover images) ----
    location /covers/ {
        alias /usr/share/nginx/html/covers/;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ---- Block common attack paths ----
    location ~ /\.(git|env|svn|hg) { deny all; return 404; }
    location ~ /(wp-admin|wp-login|administrator|phpmyadmin) { deny all; return 404; }

    # ---- Public site (Next.js SSR) — must come last as the catch-all ----
    location / {
        proxy_pass         http://public_web;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade             $http_upgrade;
        proxy_set_header   Connection          "upgrade";
        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_set_header   X-Forwarded-Host    $host;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;

        # Security headers (re-declared here: an add_header in a location block
        # suppresses inherited http-level add_headers). CSP allows the four
        # supported tracking providers + Next's inline scripts/styles.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options        "SAMEORIGIN" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://connect.facebook.net https://analytics.tiktok.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com https://connect.facebook.net https://analytics.tiktok.com; frame-src https://www.googletagmanager.com; frame-ancestors 'self'; form-action 'self'; base-uri 'self'; object-src 'none'" always;
    }
}

