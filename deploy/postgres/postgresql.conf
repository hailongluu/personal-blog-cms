# =============================================================================
# Personal Blog CMS — PostgreSQL 17 tuning
# =============================================================================
# Tuned for a single-VPS host with 8 GB RAM running both Postgres + Spring Boot.
# Do NOT use this config on a shared multi-tenant Postgres server.
# =============================================================================

# ---- Connections ----
listen_addresses = '*'
port             = 5432
max_connections  = 50
superuser_reserved_connections = 3

# ---- Memory (target ~1.5 GB for Postgres on 8 GB host) ----
shared_buffers          = 1GB
effective_cache_size    = 4GB
work_mem                = 8MB
maintenance_work_mem    = 256MB
huge_pages              = try

# ---- WAL ----
wal_level               = replica
wal_buffers             = 16MB
checkpoint_completion_target = 0.9
max_wal_size            = 2GB
min_wal_size            = 512MB
wal_log_hints           = on

# ---- Query planner ----
random_page_cost        = 1.1
effective_io_concurrency = 200

# ---- Parallelism ----
max_worker_processes    = 4
max_parallel_workers    = 4
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2

# ---- Logging ----
logging_collector       = on
log_directory           = 'log'
log_filename            = 'postgresql-%Y-%m-%d.log'
log_rotation_age        = 1d
log_rotation_size       = 100MB
log_min_duration_statement = 500ms
log_checkpoints         = on
log_connections         = off   # noisy in container; turn on for debugging
log_disconnections      = off
log_lock_waits          = on
log_temp_files          = 0
log_autovacuum_min_duration = 0

# ---- Autovacuum ----
autovacuum              = on
autovacuum_max_workers  = 2
autovacuum_naptime      = 30s

# ---- Locale ----
lc_messages             = 'en_US.UTF-8'
lc_monetary             = 'en_US.UTF-8'
lc_numeric              = 'en_US.UTF-8'
lc_time                 = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'

# ---- Misc ----
timezone                = 'UTC'
timezone_abbreviations  = 'Default'
shared_preload_libraries = 'pg_stat_statements'
track_io_timing         = on
track_activities        = on
track_counts            = on
track_functions         = pl
