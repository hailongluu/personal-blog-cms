<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f0ea"/>
      <stop offset="100%" stop-color="#e8ddd0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#2d2d3a" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Accent bar -->
  <rect x="80" y="80" width="6" height="80" fill="#c97a5e" rx="3"/>

  <!-- Eyebrow -->
  <text x="110" y="115" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#c97a5e" letter-spacing="2">PERSONAL BLOG · NEWS</text>

  <!-- Title -->
  <text x="80" y="230" font-family="ui-serif, Georgia, serif" font-size="86" font-weight="700" fill="#2d2d3a">Lưu Hải Long</text>

  <text x="80" y="310" font-family="ui-sans-serif, system-ui, sans-serif" font-size="38" font-weight="500" fill="#5a5a6e">AI, Công Nghệ &amp; Lập Trình</text>

  <!-- Description -->
  <text x="80" y="420" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="400" fill="#3d3d4e">Chia sẻ kiến thức chuyên sâu về AI agent, LLM,</text>
  <text x="80" y="455" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="400" fill="#3d3d4e">machine learning và công cụ dành cho developer.</text>

  <!-- URL -->
  <rect x="80" y="510" width="280" height="50" rx="25" fill="#2d2d3a"/>
  <text x="220" y="542" text-anchor="middle" font-family="ui-monospace, monospace" font-size="20" font-weight="500" fill="#f5f0ea">news.luuhailong.com</text>

  <!-- Corner accent -->
  <circle cx="1100" cy="110" r="40" fill="#c97a5e" opacity="0.15"/>
  <circle cx="1100" cy="110" r="20" fill="#c97a5e" opacity="0.4"/>
</svg>
