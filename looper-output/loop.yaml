version: 1
meta:
  name: blog-p2-features
  description: Implement 4 P2 features (RSS, Sitemap, Newsletter, Comments) for personal-blog-cms with TDD
  author: longluu
  created: 2026-06-24

goal:
  statement: >
    Implement 4 P2 features for the personal-blog-cms Spring Boot + React app:
    (1) RSS/Atom feed for blog posts, (2) XML sitemap for public routes,
    (3) Newsletter email send to subscribers, (4) Comment system with nested
    replies. Each feature must follow TDD (RED → GREEN → REFACTOR), end with
    git commit, and be browser-verified.
  context_sources:
    - file: ~/vibe-code/personal-blog-cms/SPEC.md
    - file: ~/vibe-code/personal-blog-cms/README.md
    - file: ~/vibe-code/personal-blog-cms/backend/src/main/java/com/blog/cms/
  definition_of_done: >
    All 4 features shipped to main branch. Backend tests pass (target: 80+/80+).
    Frontend builds clean. Each feature has at least one curl/browser verify.
    README updated with new endpoints. No new bugs introduced.
  verification:
    # Programmatic checks (auto)
    - id: backend-build-ok
      type: programmatic
      check: ["bash", "-c", "cd ~/vibe-code/personal-blog-cms/backend && mvn clean package -DskipTests -q"]
      expect: exit_zero

    - id: backend-tests-pass
      type: programmatic
      check: ["bash", "-c", "cd ~/vibe-code/personal-blog-cms/backend && mvn test -q"]
      expect: exit_zero

    - id: frontend-build-ok
      type: programmatic
      check: ["bash", "-c", "cd ~/vibe-code/personal-blog-cms/frontend && npm run build"]
      expect: exit_zero

    - id: rss-endpoint-valid
      type: programmatic
      check: ["bash", "-c", "curl -s http://localhost:8080/api/public/feed.xml | xmllint --noout -"]
      expect: exit_zero

    - id: sitemap-endpoint-valid
      type: programmatic
      check: ["bash", "-c", "curl -s http://localhost:8080/api/public/sitemap.xml | xmllint --noout -"]
      expect: exit_zero

    - id: newsletter-api-works
      type: programmatic
      check: ["bash", "-c", "curl -X POST http://localhost:8080/api/admin/newsletter/send-preview -H 'Content-Type: application/json' -o /dev/null -w '%{http_code}' | awk '{exit ($1 == 200 || $1 == 401)}'"]
      expect: exit_zero

    - id: comments-api-works
      type: programmatic
      check: ["bash", "-c", "curl -s 'http://localhost:8080/api/public/posts?pageSize=1' | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get(\"data\",[{}])[0].get(\"id\",0))'"]
      expect: stdout_contains
      contains: ""

    # Judge rubric (self-judge by host)
    - id: code-quality
      type: judge
      rubric: >
        Each feature implementation must (a) follow existing code patterns in
        the project, (b) have proper error handling, (c) include JavaDoc or
        comments on public APIs, (d) not introduce hardcoded values that should
        be config. Score PASS if all four hold; REVISE otherwise.

    - id: seo-correctness
      type: judge
      rubric: >
        RSS feed must follow Atom 2.0 or RSS 2.0 spec. Sitemap must follow
        sitemaps.org protocol. Both must include proper XML declaration and
        namespaces. Score PASS if compliant; REVISE otherwise.

host:
  cli: hermes-agent
  model: MiniMax-M3
  invoke: ["hermes"]
  timeout_sec: 7200

council:
  - id: reviewer-1
    role: judge
    cli: human
    model: sếp-long
    invoke: ["telegram:997864855"]
    timeout_sec: 3600
    scope: [plan, delivery]
    note: >
      Sếp Long reviews plans before each feature is implemented, and verifies
      deliveries after each feature ships.

gates:
  plan_gate:
    when: before_each_feature
    members: [reviewer-1]
    verdict_policy: revise_until_clean
    verdict_source: reviewer-1
    criteria: [code-quality, seo-correctness]
    max_revisions: 2

  delivery_gate:
    when: after_each_feature
    members: [reviewer-1]
    verdict_policy: revise_until_clean
    verdict_source: reviewer-1
    criteria: [backend-tests-pass, frontend-build-ok]
    max_revisions: 2

loop_control:
  max_iterations: 12
  budget:
    usd: 0.50
    tokens: 2_000_000
    wall_clock_min: 240
  no_progress:
    max_stalled_iterations: 2
    signals:
      - same feature blocked 2 iterations
      - test failure pattern repeats
      - sếp rejected same code twice
    action: human_checkpoint
  human_checkpoints:
    - after_feature_1_plan
    - after_feature_2_delivery
    - after_feature_3_delivery
    - after_feature_4_delivery
  stop_conditions:
    - "all 4 features delivered and committed"
    - "max_iterations reached"
    - "sếp says stop"
    - "budget cap exceeded"

execution:
  mode: in_session
  isolation: current_workspace
  side_effects:
    requires_approval: true
    duplicate_action_check: true
    note: "Each feature requires sếp approval before moving to next"

observability:
  state_file: ~/vibe-code/personal-blog-cms/looper-output/loop-workspace/state.json
  run_log: ~/vibe-code/personal-blog-cms/looper-output/loop-workspace/run-log.md
  checkpoint_granularity: gate

privacy:
  egress:
    - to: human-reviewer
      sends: [plan, deliveries]
      redact: [".env", "secrets/**", "**/*.key", "**/application*.yml"]
      consent: required

workspace:
  dir: ~/vibe-code/personal-blog-cms/looper-output
  layout:
    - loop.yaml
    - loop.resolved.json
    - LOOP.md
    - RUN_IN_SESSION.md
    - run-loop.py
    - README.md
    - loop-workspace/
